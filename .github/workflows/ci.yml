# Bun is pinned (not "latest") because the worldgen characterization tests hash
# Math.sin-based noise output, and Math.sin results are engine-defined. Bumping
# the version may legitimately require re-baselining those hashes — see
# docs/testing.md before touching either.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run format:check
      - run: bun test
      - run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
